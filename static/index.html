<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Offline</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

  <!-- ── Mapa ───────────────────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── HUD: painel superior ──────────────────────────────────────────── -->
  <header class="hud-top">
    <div class="hud-logo">⚓ Mapa Offline</div>

    <div class="hud-coords" id="hud-coords">— , —</div>

    <div class="hud-actions">
      <button class="hud-btn" id="btn-center" title="Centralizar mapa">⊕</button>
      <button class="hud-btn" id="btn-fullscreen" title="Tela cheia">⛶</button>
    </div>
  </header>

  <!-- ── HUD: painel lateral direito (layers / módulos) ─────────────────── -->
  <aside class="hud-side" id="hud-side">
    <div class="hud-side-title">Camadas</div>

    <!-- Layer base sempre presente -->
    <label class="layer-toggle active" id="toggle-base">
      <span class="layer-icon">🗺️</span>
      <span class="layer-label">Mapa base</span>
      <span class="layer-check">✓</span>
    </label>

    <!-- Overlays dinâmicos injetados pelo JS ao receber /overlay/snapshot -->
    <div id="overlay-toggles"></div>

    <div class="hud-side-title" style="margin-top:12px">Módulos</div>
    <div id="module-status"></div>
  </aside>

  <!-- ── HUD: painel inferior (zoom / escala) ───────────────────────────── -->
  <footer class="hud-bottom">
    <div class="hud-zoom" id="hud-zoom">Z —</div>
    <div id="scale-bar"></div>
    <div class="hud-credit">Dados offline</div>
  </footer>

  <!-- ── Popup de feature ───────────────────────────────────────────────── -->
  <div class="feature-popup hidden" id="feature-popup">
    <button class="popup-close" id="popup-close">✕</button>
    <div id="popup-content"></div>
  </div>

  <!-- ── Scripts dos módulos JS ────────────────────────────────────────── -->
  <script src="/js/map.js"></script>
  <script src="/js/hud.js"></script>
  <script src="/js/overlay.js"></script>
</body>
</html>
